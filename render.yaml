services:
  - type: web
    name: loginpanelcheckers
    runtime: node
    plan: starter
    buildCommand: |
      npm ci
      export PUPPETEER_CACHE_DIR=/opt/render/project/src/.cache/puppeteer
      npx puppeteer browsers install chrome
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.cache/puppeteer
      - key: BROWSER_HEADLESS
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PROVIDER
        value: mongodb
      - key: MONGODB_URI
        value: mongodb+srv://paymentmanger.gvaavzc.mongodb.net/?retryWrites=true&w=majority&authSource=admin&appName=paymentmanger
      - key: MONGODB_USERNAME
        sync: false
      - key: MONGODB_PASSWORD
        sync: false
      - key: MONGODB_DB_NAME
        value: mydb
