services:
  - type: web
    name: loginpanelcheckers
    runtime: node
    plan: starter
    buildCommand: npm ci && npx puppeteer browsers install chrome
    preDeployCommand: npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/.cache/puppeteer
      - key: BROWSER_HEADLESS
        value: "1"
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: cloverapp
